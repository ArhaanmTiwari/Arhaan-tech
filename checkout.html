<!DOCTYPE html>
<html>
  <head>
    <title>Checkout | Arhaan Tech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
        text-align: center;
      }

      header {
        background: #2b5876;
        color: white;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
      }

      .container {
        max-width: 800px;
        margin: 30px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h2 {
        margin-bottom: 20px;
      }

      ul {
        list-style: none;
        padding: 0;
      }

      li {
        padding: 10px 0;
        border-bottom: 1px solid #ddd;
        text-align: left;
      }

      .total {
        font-size: 22px;
        font-weight: bold;
        margin-top: 20px;
      }

      .checkout-form {
        margin-top: 25px;
        text-align: left;
      }

      .checkout-form input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      .pay-button {
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff9800;
        color: white;
        font-size: 18px;
        cursor: pointer;
        margin-top: 15px;
        width: 100%;
      }

      .pay-button:hover {
        background: #e68900;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: #ff9800;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      button.back-btn {
        background: #333;
        margin-top: 20px;
        padding: 10px 20px;
      }
    </style>
  </head>

  <body>
    <header>🛒 Checkout</header>

    <div class="container">
      <h2>Your Cart</h2>
      <ul id="cart-items"></ul>
      <p class="total" id="cart-total">Total: ₹0</p>

      <h2>Customer Details</h2>
      <form class="checkout-form" id="checkout-form">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="text" id="address" placeholder="Address" required />
        <input type="tel" id="phone" placeholder="Phone Number" required />
      </form>

      <!-- Paytm Button -->
      <button class="pay-button" id="paytm-button">Pay with Paytm</button>

      <button class="back-btn" onclick="window.location.href='index.html'">
        ⬅ Back to Home
      </button>
    </div>

    <script src="cart.js"></script>
    <script>
      // Render cart on checkout page
      function renderCheckoutCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartItems = document.getElementById("cart-items");
        const cartTotal = document.getElementById("cart-total");

        cartItems.innerHTML = "";
        let total = 0;

        cart.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = `${item.name} - ₹${item.price}`;
          cartItems.appendChild(li);
          total += item.price;
        });

        cartTotal.textContent = `Total: ₹${total}`;
      }

      window.addEventListener("load", () => {
        renderCheckoutCart();
      });

      // Paytm Button (example using Paytm Payment Link)
      document.getElementById("paytm-button").addEventListener("click", () => {
        const name = document.getElementById("name").value;
        const address = document.getElementById("address").value;
        const phone = document.getElementById("phone").value;

        if (!name || !address || !phone) {
          alert("Please fill all customer details!");
          return;
        }

        // Example Paytm link (replace with your real link)
        const paytmLink = "https://paytm.me/YourPaymentLinkHere";

        // Open Paytm payment page
        window.open(paytmLink, "_blank");

        // Clear cart after payment
        localStorage.removeItem("cart");
        alert("Thank you for your order! Your cart has been cleared.");
        window.location.href = "home.html";
      });
    </script>
  </body>
</html>
