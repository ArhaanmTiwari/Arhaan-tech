<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Arhaan Tech</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #2b5876, #4e4376);
        color: white;
        text-align: center;
      }
      header {
        padding: 22px;
        font-size: 26px;
        background: rgba(0, 0, 0, 0.55);
        font-weight: bold;
      }
      .container {
        max-width: 760px;
        margin: 28px auto;
        background: rgba(255, 255, 255, 0.06);
        padding: 22px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }
      .cart-list {
        text-align: left;
        margin: 0 auto;
        max-width: 680px;
      }
      .cart-item {
        background: rgba(255, 255, 255, 0.08);
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      .total {
        font-size: 20px;
        font-weight: bold;
        margin-top: 12px;
        color: #ffd17a;
      }
      .checkout-form {
        margin-top: 18px;
        text-align: left;
        max-width: 680px;
        margin-left: auto;
        margin-right: auto;
      }
      .checkout-form input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: none;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: #ff9800;
        color: black;
        font-weight: bold;
        cursor: pointer;
        margin-top: 12px;
      }
      .btn:hover {
        background: #e68900;
      }
      .back-btn {
        margin-top: 10px;
        display: block;
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>🛒 Checkout — Arhaan Tech</header>
    <div class="container">
      <h2>Your Cart</h2>
      <div class="cart-list" id="cart-items"></div>
      <div class="total" id="cart-total">Total: ₹0</div>

      <h2 style="margin-top: 18px">Customer Details</h2>
      <div class="checkout-form">
        <input id="name" type="text" placeholder="Full name" required />
        <input
          id="address"
          type="text"
          placeholder="Delivery address"
          required
        />
        <input id="phone" type="tel" placeholder="Phone number" required />
      </div>

      <button class="btn" id="place-order-btn">Place Order & Pay</button>
      <button class="back-btn" onclick="window.location.href='home.html'">
        ⬅ Back to Home
      </button>
    </div>

    <script src="cart.js"></script>
    <script src="webhook.js"></script>
    <script>
      function getLocalCart() {
        return JSON.parse(localStorage.getItem("cart")) || [];
      }
      function renderCheckoutCart() {
        const cart = typeof getCart === "function" ? getCart() : getLocalCart();
        const container = document.getElementById("cart-items");
        const totalEl = document.getElementById("cart-total");
        container.innerHTML = "";
        let total = 0;
        if (!cart || cart.length === 0) {
          container.innerHTML = "<p>Your cart is empty.</p>";
          totalEl.innerText = "Total: ₹0";
          return { cart: [], total: 0 };
        }
        cart.forEach((item) => {
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `<div>${item.name}</div><div>₹${item.price}</div>`;
          container.appendChild(div);
          total += Number(item.price) || 0;
        });
        totalEl.innerText = "Total: ₹" + total;
        return { cart, total };
      }
      window.addEventListener("load", () => {
        renderCheckoutCart();
      });
      document
        .getElementById("place-order-btn")
        .addEventListener("click", async () => {
          const name = document.getElementById("name").value.trim();
          const address = document.getElementById("address").value.trim();
          const phone = document.getElementById("phone").value.trim();
          if (!name || !address || !phone) {
            alert(
              "Please fill name, address and phone before placing the order."
            );
            return;
          }
          const { cart, total } = renderCheckoutCart();
          if (!cart || cart.length === 0) {
            alert("Your cart is empty.");
            return;
          }
          const orderData = {
            name,
            address,
            phone,
            items: cart.map((i) => i.name).join(", "),
            total,
          };
          try {
            await sendOrderToWebhook(orderData);
            localStorage.removeItem("cart");
            if (typeof updateCartCount === "function") updateCartCount();
            if (typeof renderCartSidebar === "function") renderCartSidebar();
            alert(
              "Thank you! Your order was sent. You will be redirected to home."
            );
            window.location.href = "home.html";
          } catch (err) {
            console.error(err);
            alert("There was a problem sending the order. Try again.");
          }
        });
    </script>
  </body>
</html>
