<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout | Arhaan Tech</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #2b5876, #4e4376);
        color: white;
        text-align: center;
      }
      header {
        padding: 22px;
        font-size: 26px;
        background: rgba(0, 0, 0, 0.55);
        font-weight: bold;
      }
      .container {
        max-width: 760px;
        margin: 28px auto;
        background: rgba(255, 255, 255, 0.06);
        padding: 22px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      }
      .cart-list {
        text-align: left;
        margin: 0 auto;
        max-width: 680px;
      }
      .cart-item {
        background: rgba(255, 255, 255, 0.08);
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
      }
      .total {
        font-size: 20px;
        font-weight: bold;
        margin-top: 12px;
        color: #ffd17a;
      }
      .checkout-form {
        margin-top: 18px;
        text-align: left;
        max-width: 680px;
        margin-left: auto;
        margin-right: auto;
      }
      .checkout-form input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: none;
        box-sizing: border-box;
      }
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: #ff9800;
        color: black;
        font-weight: bold;
        cursor: pointer;
        margin-top: 12px;
      }
      .btn:hover {
        background: #e68900;
      }
      .back-btn {
        margin-top: 10px;
        display: block;
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>🛒 Checkout — Arhaan Tech</header>
    <div class="container">
      <h2>Your Cart</h2>
      <div class="cart-list" id="cart-items"></div>
      <div class="total" id="cart-total">Total: ₹0</div>

      <h2 style="margin-top: 18px">Customer Details</h2>
      <div class="checkout-form">
        <input id="name" type="text" placeholder="Full name" required />
        <input
          id="address"
          type="text"
          placeholder="Delivery address"
          required
        />
        <input id="phone" type="tel" placeholder="Phone number" required />
      </div>

      <button class="btn" id="place-order-btn">Place Order & Pay</button>
      <button class="back-btn" onclick="window.location.href='home.html'">
        ⬅ Back to Home
      </button>
    </div>

    <script src="cart.js"></script>
    <script src="webhook.js"></script>
    <script>
      async function placeOrder() {
        const orderData = {
          name: "Test Name",
          phone: "1234567890",
          address: "Test Address",
          items: "Test Item",
          total: 100,
        };

        console.log("Sending data:", orderData);

        const response = await fetch(
          "https://script.google.com/macros/s/AKfycbwefJXZo1L04VAKpf33ucuJ1V5yWg2omi-BLCXniQKIKEk0S0l0MJ0R-zrOzCAMxmyOeQ/exec",
          {
            method: "POST",
            body: JSON.stringify(orderData),
            headers: {
              "Content-Type": "application/json",
            },
          }
        );

        const text = await response.text();
        console.log("Server response:", text);

        alert("Check console");
      }
    </script>
  </body>
</html>
